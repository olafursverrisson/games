<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wobble Basket 2v2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-wrap">
    <h1>Wobble Basket 2v2</h1>
    <p class="subtitle">First to 5 • Touch a ball to pick it up • Time 70° sway jumps for direction</p>
    <canvas id="game" width="1200" height="700" aria-label="Basketball game canvas"></canvas>
    <section class="hud">
      <div><strong>Red Team:</strong> P1 <kbd>W</kbd>, P2 <kbd>E</kbd></div>
      <div><strong>Blue Team:</strong> P3 <kbd>I</kbd>, P4 <kbd>O</kbd></div>
      <button id="toggleMusic" type="button">Start Music</button>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
